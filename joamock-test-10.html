let current=0
let score=0
let userAnswers={}

let studentName=""
let studentPhone=""

let examTime=5400
let examTimer

/* START TIMER */

function startExamTimer(){

examTimer=setInterval(function(){

let min=Math.floor(examTime/60)
let sec=examTime%60

document.getElementById("examTimer").innerHTML=
"<span>⏱ Time Left : "+min+":"+(sec<10?"0":"")+sec+"</span>"

examTime--

if(examTime<0){

clearInterval(examTimer)

alert("Time Over! Test Submitted")

showResult()

}

},1000)

}

/* BEGIN TEST */

function beginTest(){

studentName=document.getElementById("Name").value
studentPhone=document.getElementById("Phone").value

if(studentName=="" || studentPhone==""){
alert("Enter name and phone")
return
}

document.getElementById("formBox").style.display="none"
document.getElementById("countBox").style.display="block"

let t=5
document.getElementById("count").innerHTML=t

let timer=setInterval(function(){

document.getElementById("count").innerHTML=t

t--

if(t<0){

clearInterval(timer)

document.getElementById("countBox").style.display="none"

document.getElementById("questionBox").style.display="block"
document.getElementById("examTimer").style.display="block"

startExamTimer()

showQuestion()

}

},1000)

}

/* SHOW QUESTION */

function showQuestion(){

let q=questions[current]

let html=""

html+="<h3>Q"+(current+1)+". "+q.en+"</h3>"
html+="<p>"+q.hi+"</p>"

html+='<label class="option"><input type="radio" name="ans" value="A"> A. '+q.A+'</label>'
html+='<label class="option"><input type="radio" name="ans" value="B"> B. '+q.B+'</label>'
html+='<label class="option"><input type="radio" name="ans" value="C"> C. '+q.C+'</label>'
html+='<label class="option"><input type="radio" name="ans" value="D"> D. '+q.D+'</label>'

html+="<br><button onclick='nextQuestion()'>Next</button>"

document.getElementById("questionBox").innerHTML=html

}

/* NEXT QUESTION */

function nextQuestion(){

let selected=document.querySelector('input[name="ans"]:checked')

if(selected){

userAnswers[current]=selected.value

if(selected.value==questions[current].ans){

score++

}

}

current++

if(current<questions.length){

showQuestion()

}else{

showResult()

}

}

function showResult(){

clearInterval(examTimer)

document.getElementById("questionBox").style.display="none"

let box=document.getElementById("resultBox")

box.style.display="block"

let html=""

html+="<h2 style='text-align:center'>JOA IT MOCK TEST RESULT</h2>"

html+="<b>Name :</b> "+studentName+"<br>"
html+="<b>Phone :</b> "+studentPhone+"<br>"
html+="<b>Score :</b> "+score+" / "+questions.length+"<br><br>"

for(let i=0;i<questions.length;i++){

let q=questions[i]

html+="<hr>"

html+="<b>Q"+(i+1)+". "+q.en+"</b><br>"
html+=q.hi+"<br><br>"

html+="A. "+q.A+"<br>"
html+="B. "+q.B+"<br>"
html+="C. "+q.C+"<br>"
html+="D. "+q.D+"<br><br>"

html+="Your Answer : "+(userAnswers[i] || "Not Attempted")+"<br>"

html+="Correct Answer : "+q.ans+"<br>"

}

html+="<br><button onclick='downloadPDF()'>Download Result PDF</button>"

box.innerHTML="<div style='text-align:left'>"+html+"</div>"

}

async function downloadPDF(){

const { jsPDF } = window.jspdf

let element=document.getElementById("resultBox")

let canvas=await html2canvas(element,{scale:2})

let imgData=canvas.toDataURL("image/jpeg",0.6)

let pdf=new jsPDF("p","mm","a4")

let imgWidth=190
let pageHeight=297
let imgHeight=canvas.height*imgWidth/canvas.width

let heightLeft=imgHeight
let position=10

pdf.addImage(imgData,"JPEG",10,position,imgWidth,imgHeight)

heightLeft-=pageHeight

while(heightLeft>0){

position=heightLeft-imgHeight

pdf.addPage()

pdf.addImage(imgData,"JPEG",10,position,imgWidth,imgHeight)

heightLeft-=pageHeight

}

pdf.save("Mock_Test_Result.pdf")

}
</script>
