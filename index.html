<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JOA IT Mock Test</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

body{
font-family:Arial;
background:#eef2ff;
margin:0;
padding:0;
}

.container{
max-width:800px;
margin:auto;
background:white;
margin-top:40px;
padding:30px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

.center{text-align:center}

button{
background:#2d5cff;
color:white;
border:none;
padding:10px 18px;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1c3cb0;
}

.option{
display:block;
margin-top:6px;
}

.timer{
font-size:28px;
color:red;
font-weight:bold;
}

</style>

<script>

let name=""
let phone=""
let current=1
let score=0
let userAnswers={}

let examTime=90*60
let examTimer

/* QUESTIONS */

let questions=[

{
id:1,
en:"Which memory is used to store BIOS in a computer?",
hi:"कंप्यूटर में BIOS किस मेमोरी में स्टोर किया जाता है?",
A:"RAM",
B:"ROM",
C:"Cache",
D:"Register",
ans:"B"
},

{
id:2,
en:"Which HTML input type is used to upload a file from user computer?",
hi:"यूज़र के कंप्यूटर से फाइल अपलोड करने के लिए कौन-सा HTML input type उपयोग होता है?",
A:"upload",
B:"file",
C:"attach",
D:"document",
ans:"B"
}

]

/* OPEN MOCK TEST LIST */

function openTests(){

document.getElementById("home").style.display="none"
document.getElementById("testList").style.display="block"

}

/* START TEST */

function startTest(){

document.getElementById("testList").style.display="none"
document.getElementById("formBox").style.display="block"

}

/* BEGIN AFTER NAME */

function beginTest(){

name=document.getElementById("Name").value
phone=document.getElementById("Phone").value

if(name=="" || phone==""){
alert("Enter name and phone")
return
}

document.getElementById("formBox").style.display="none"
document.getElementById("countBox").style.display="block"

let t=5

let timer=setInterval(function(){

document.getElementById("count").innerHTML=t

t--

if(t<0){

clearInterval(timer)

document.getElementById("countBox").style.display="none"

startExamTimer()

showQuestion()

}

},1000)

}

/* MAIN EXAM TIMER */

function startExamTimer(){

examTimer=setInterval(function(){

let min=Math.floor(examTime/60)
let sec=examTime%60

document.getElementById("examTimer").innerHTML=
"Time Left : "+min+":"+(sec<10?"0":"")+sec

examTime--

if(examTime<0){

clearInterval(examTimer)

alert("Time Over! Test Submitted")

showResult()

}

},1000)

}

/* SHOW QUESTION */

function showQuestion(){

let q=questions[current-1]

let html=""

html+="<div class='timer' id='examTimer'></div>"

html+="<h3>Q"+current+". "+q.en+"</h3>"
html+="<p>"+q.hi+"</p>"

html+='<label class="option"><input type="radio" name="ans" value="A"> A. '+q.A+'</label>'
html+='<label class="option"><input type="radio" name="ans" value="B"> B. '+q.B+'</label>'
html+='<label class="option"><input type="radio" name="ans" value="C"> C. '+q.C+'</label>'
html+='<label class="option"><input type="radio" name="ans" value="D"> D. '+q.D+'</label>'

html+="<br><button onclick='nextQuestion()'>Next</button>"

document.getElementById("questionBox").innerHTML=html
document.getElementById("questionBox").style.display="block"

}

/* NEXT QUESTION */

function nextQuestion(){

let selected=document.querySelector('input[name="ans"]:checked')

if(selected){

userAnswers[current]=selected.value

if(selected.value==questions[current-1].ans){
score++
}

}

current++

if(current<=questions.length){

showQuestion()

}else{

showResult()

}

}

/* RESULT */

function showResult(){

clearInterval(examTimer)

document.getElementById("questionBox").style.display="none"

document.getElementById("resultBox").style.display="block"

document.getElementById("score").innerHTML="Score : "+score+" / "+questions.length

}

/* PDF */

async function downloadPDF(){

const { jsPDF } = window.jspdf

let element=document.getElementById("resultBox")

let canvas=await html2canvas(element,{scale:2})

let imgData=canvas.toDataURL("image/jpeg",0.6)

let pdf=new jsPDF("p","mm","a4")

let imgWidth=190
let imgHeight=canvas.height*imgWidth/canvas.width

pdf.addImage(imgData,"JPEG",10,10,imgWidth,imgHeight)

pdf.save("Mock_Test_Result.pdf")

}

</script>
</head>

<body>

<div class="container center" id="home">

<h2>HP JOA (IT) MOCK TEST PORTAL</h2>

<br>

<button onclick="openTests()">JOA (IT) 2026 MOCK TEST</button>

</div>


<div class="container center" id="testList" style="display:none">

<h3>Select Mock Test</h3>

<button onclick="startTest()">Mock Test 07</button>

<a href="mock-test-1.html">
<button>Mock Test 06</button>
</a>

</div>


<div class="container" id="formBox" style="display:none">

<h3>Candidate Details</h3>

Name<br>
<input type="text" id="Name"><br><br>

Phone<br>
<input type="text" id="Phone"><br><br>

<button onclick="beginTest()">Start Test</button>

</div>


<div class="container center" id="countBox" style="display:none">

<h3>Test will start in</h3>

<div class="timer" id="count">5</div>

</div>


<div class="container" id="questionBox" style="display:none"></div>


<div class="container center" id="resultBox" style="display:none">

<h2 id="score"></h2>

<br>

<button onclick="downloadPDF()">Download Result PDF</button>

</div>

</body>
</html>
