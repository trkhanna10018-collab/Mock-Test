<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>HP JOA IT Mock Tests</title>

<!-- =========================
PDF Library (PDF बनाने के लिए)
========================= -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>


<style>

/* =========================
WEBSITE DESIGN
========================= */

body{
font-family:Arial;
background:#f2f2f2;
margin:0;
padding:0;
}

.container{
max-width:800px;
margin:auto;
background:white;
margin-top:40px;
padding:30px;
border-radius:10px;
box-shadow:0 0 12px rgba(0,0,0,0.2);
}

.center{text-align:center}

button{
padding:12px 25px;
margin:8px;
font-size:16px;
background:#007bff;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#0056b3
}

.question{
display:none
}

/* =========================
OPTIONS ALIGNMENT
========================= */

.options{
text-align:left;
margin-top:15px;
}

.options label{
display:block;
margin:8px 0;
}

/* =========================
ANSWER REVIEW DESIGN
========================= */

.review{
background:#f2f2f2;
padding:10px;
margin-top:15px;
text-align:left;
}

.timer{
font-size:25px;
font-weight:bold;
color:red;
text-align:center;
}

</style>


<script>

/* =========================
GLOBAL VARIABLES
========================= */

let name=""
let phone=""
let current=1
let score=0
let testNumber=0

let userAnswers={}


/* =========================
QUESTIONS DATABASE
यहीं पर आप questions बदलेंगे
========================= */

let questions={

1:[
{
q:"Which memory stores BIOS?",
A:"RAM",
B:"ROM",
C:"Cache",
D:"Register",
ans:"B"
},

{
q:"Which device is optical storage?",
A:"SSD",
B:"DVD",
C:"Flash Drive",
D:"Hard Disk",
ans:"B"
},

{
q:"Which OS component manages hardware communication?",
A:"Kernel",
B:"Shell",
C:"Compiler",
D:"Interpreter",
ans:"A"
}
],

2:[
{
q:"What is time complexity of binary search?",
A:"O(n)",
B:"O(log n)",
C:"O(n2)",
D:"O(1)",
ans:"B"
},

{
q:"Which layer handles routing?",
A:"Network",
B:"Transport",
C:"Session",
D:"Data Link",
ans:"A"
},

{
q:"Which protocol sends email?",
A:"HTTP",
B:"FTP",
C:"SMTP",
D:"SNMP",
ans:"C"
}
]

}


/* =========================
MOCK TEST AUTO DUPLICATION
(3 से 15 तक same questions)
========================= */

for(let i=3;i<=15;i++){
questions[i]=questions[1]
}



/* =========================
HOME PAGE से MOCK LIST
========================= */

function openTests(){

document.getElementById("home").style.display="none"
document.getElementById("testList").style.display="block"

}



/* =========================
MOCK TEST START
========================= */

function startTest(num){

testNumber=num
current=1
score=0
userAnswers={}

document.getElementById("testList").style.display="none"
document.getElementById("formBox").style.display="block"

}



/* =========================
NAME PHONE FORM
========================= */

function begin(){

name=document.getElementById("name").value
phone=document.getElementById("phone").value

if(name=="" || phone==""){
alert("Enter name and phone")
return
}

document.getElementById("formBox").style.display="none"
document.getElementById("countBox").style.display="block"

let t=5

let timer=setInterval(function(){

document.getElementById("count").innerHTML=t

t--

if(t<0){

clearInterval(timer)

document.getElementById("countBox").style.display="none"
document.getElementById("qBox").style.display="block"

loadQuestion()

}

},1000)

}



/* =========================
QUESTION LOAD FUNCTION
========================= */

function loadQuestion(){

let q=questions[testNumber][current-1]

document.getElementById("qText").innerHTML=current+". "+q.q

document.getElementById("optA").innerHTML=q.A
document.getElementById("optB").innerHTML=q.B
document.getElementById("optC").innerHTML=q.C
document.getElementById("optD").innerHTML=q.D

document.querySelectorAll('input[name="opt"]').forEach(r=>r.checked=false)

}



/* =========================
NEXT QUESTION
========================= */

function next(){

let sel=document.querySelector('input[name="opt"]:checked')

if(sel){

userAnswers[current]=sel.value

if(sel.value==questions[testNumber][current-1].ans){
score++
}

}

current++

if(current<=3){

loadQuestion()

}else{

showResult()

}

}



/* =========================
RESULT + REVIEW
========================= */

function showResult(){

document.getElementById("qBox").style.display="none"
document.getElementById("resultBox").style.display="block"

document.getElementById("score").innerHTML="Score : "+score+"/3"

let review=""

for(let i=1;i<=3;i++){

let q=questions[testNumber][i-1]

review+=`

<div class="review">

<b>Q${i}: ${q.q}</b><br><br>

A: ${q.A}<br>
B: ${q.B}<br>
C: ${q.C}<br>
D: ${q.D}<br><br>

<b>Your Answer:</b> ${userAnswers[i] || "Not Attempted"}<br>
<b>Correct Answer:</b> ${q.ans}

</div>
`

}

document.getElementById("review").innerHTML=review

}



/* =========================
PDF GENERATION
========================= */

function downloadPDF(){

const { jsPDF } = window.jspdf

let doc=new jsPDF()

let y=20

doc.text("Mock Test Result",20,y); y+=10

doc.text("Name : "+name,20,y); y+=8
doc.text("Phone : "+phone,20,y); y+=8

doc.text("Score : "+score+"/3",20,y); y+=12

for(let i=1;i<=3;i++){

let q=questions[testNumber][i-1]

doc.text("Q"+i+": "+q.q,20,y); y+=8

doc.text("A: "+q.A,25,y); y+=6
doc.text("B: "+q.B,25,y); y+=6
doc.text("C: "+q.C,25,y); y+=6
doc.text("D: "+q.D,25,y); y+=8

doc.text("Your Answer: "+(userAnswers[i] || "Not Attempted"),25,y); y+=6
doc.text("Correct Answer: "+q.ans,25,y); y+=10

if(y>270){
doc.addPage()
y=20
}

}

doc.save("Mock_Test_Result.pdf")

}

</script>

</head>


<body>


<!-- =========================
HOME PAGE
========================= -->

<div class="container center" id="home">

<h1>Himachal Pradesh</h1>
<h2>JOA (IT) 2026 Preparation Portal</h2>

<br>

<button onclick="openTests()">JOA (IT) 2026 MOCK TEST</button>

</div>



<!-- =========================
MOCK TEST LIST
========================= -->

<div class="container center" id="testList" style="display:none">

<h2>Select Mock Test</h2>

<script>

for(let i=1;i<=15;i++){
document.write(`<button onclick="startTest(${i})">Mock Test ${i}</button>`)
}

</script>

</div>



<!-- =========================
CANDIDATE DETAILS
========================= -->

<div class="container" id="formBox" style="display:none">

<h3>Candidate Details</h3>

Name<br>
<input type="text" id="name"><br><br>

Phone<br>
<input type="text" id="phone"><br><br>

<button onclick="begin()">Start Test</button>

</div>



<!-- =========================
COUNTDOWN
========================= -->

<div class="container center" id="countBox" style="display:none">

<h2>Test will start in</h2>

<div class="timer" id="count">5</div>

</div>



<!-- =========================
QUESTION SCREEN
========================= -->

<div class="container question" id="qBox">

<p id="qText"></p>

<div class="options">

<label><input type="radio" name="opt" value="A"> A. <span id="optA"></span></label>
<label><input type="radio" name="opt" value="B"> B. <span id="optB"></span></label>
<label><input type="radio" name="opt" value="C"> C. <span id="optC"></span></label>
<label><input type="radio" name="opt" value="D"> D. <span id="optD"></span></label>

</div>

<br>

<button onclick="next()">Next</button>

</div>



<!-- =========================
RESULT SCREEN
========================= -->

<div class="container" id="resultBox" style="display:none">

<h2 id="score"></h2>

<div id="review"></div>

<br>

<button onclick="downloadPDF()">Download PDF</button>

</div>


</body>
</html>
