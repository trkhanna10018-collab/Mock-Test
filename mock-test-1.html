<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JOA IT Mock Test</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:0;
padding:0;
}

h2{
text-align:center;
}

.box{
background:white;
padding:20px;
margin:20px auto;
width:90%;
max-width:700px;
border-radius:10px;
}

.option{
display:block;
margin:8px 0;
font-size:18px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

#timer{
font-size:20px;
color:red;
font-weight:bold;
text-align:center;
margin-top:10px;
}

</style>
</head>

<body>

<h2>JOA IT CBT Mock Test</h2>

<div id="timer"></div>

<div id="formBox" class="box">

<h3>Enter Details</h3>

<input id="name" placeholder="Enter Name"><br><br>

<input id="phone" placeholder="Enter Phone"><br><br>

<button onclick="beginTest()">Start Test</button>

</div>

<div id="questionBox" class="box" style="display:none"></div>

<div id="resultBox" class="box" style="display:none"></div>

<script>

let questions=[

{
id:1,
eng:"What is OneDrive in Microsoft 365?",
hin:"Microsoft 365 में OneDrive क्या है?",
A:"A web browser / वेब ब्राउज़र",
B:"A cloud storage service / क्लाउड स्टोरेज सेवा",
C:"An operating system / ऑपरेटिंग सिस्टम",
D:"A programming language / प्रोग्रामिंग भाषा",
ans:"B"
},

{
id:2,
eng:"Which option is used to upload files to OneDrive?",
hin:"OneDrive में फ़ाइल अपलोड करने के लिए कौन-सा विकल्प उपयोग किया जाता है?",
A:"Import / इम्पोर्ट",
B:"Upload / अपलोड",
C:"Insert / इंसर्ट",
D:"Transfer / ट्रांसफर",
ans:"B"
},

{
id:3,
eng:"Which option allows downloading a file from OneDrive to a local computer?",
hin:"OneDrive से फ़ाइल को लोकल कंप्यूटर में डाउनलोड करने के लिए कौन-सा विकल्प है?",
A:"Export / एक्सपोर्ट",
B:"Save Copy / सेव कॉपी",
C:"Download / डाउनलोड",
D:"Transfer / ट्रांसफर",
ans:"C"
}

]

let current=0
let score=0
let userAnswers={}
let studentName=""
let studentPhone=""

let time=5400
let timerInterval

function startTimer(){

timerInterval=setInterval(()=>{

let min=Math.floor(time/60)
let sec=time%60

document.getElementById("timer").innerHTML=
"Time Left: "+min+":"+sec

time--

if(time<0){

clearInterval(timerInterval)
showResult()

}

},1000)

}

function beginTest(){

studentName=document.getElementById("name").value
studentPhone=document.getElementById("phone").value

if(studentName=="" || studentPhone==""){
alert("Enter name and phone")
return
}

document.getElementById("formBox").style.display="none"
document.getElementById("questionBox").style.display="block"

setTimeout(startTimer,5000)

showQuestion()

}

function showQuestion(){

let q=questions[current]

let html=""

html+="<h3>Q"+(current+1)+": "+q.eng+"</h3>"
html+="<p>"+q.hin+"</p>"

html+=optionHTML("A",q.A)
html+=optionHTML("B",q.B)
html+=optionHTML("C",q.C)
html+=optionHTML("D",q.D)

html+="<button onclick='nextQuestion()'>Next</button>"

document.getElementById("questionBox").innerHTML=html

}

function optionHTML(letter,text){

return `
<label class="option">
<input type="radio" name="ans" value="${letter}">
${letter}. ${text}
</label>
`

}

function nextQuestion(){

let selected=document.querySelector('input[name="ans"]:checked')

if(selected){

userAnswers[current]=selected.value

if(selected.value==questions[current].ans){
score++
}

}

current++

if(current<questions.length){

showQuestion()

}else{

showResult()

}

}

function showResult(){

clearInterval(timerInterval)

document.getElementById("questionBox").style.display="none"

let html=""

html+="<h3>Result</h3>"
html+="Name: "+studentName+"<br>"
html+="Phone: "+studentPhone+"<br><br>"
html+="Score: "+score+" / "+questions.length+"<br><br>"

questions.forEach((q,i)=>{

html+="<hr>"

html+="<b>Q"+(i+1)+": "+q.eng+"</b><br>"
html+=q.hin+"<br><br>"

html+="A. "+q.A+"<br>"
html+="B. "+q.B+"<br>"
html+="C. "+q.C+"<br>"
html+="D. "+q.D+"<br><br>"

html+="Your Answer: "+(userAnswers[i] || "Not Attempted")+"<br>"
html+="Correct Answer: "+q.ans+"<br>"

})

html+="<br><button onclick='downloadPDF()'>Download PDF</button>"

document.getElementById("resultBox").innerHTML=html
document.getElementById("resultBox").style.display="block"

}

function downloadPDF(){

const { jsPDF } = window.jspdf

let pdf = new jsPDF()

let x=15
let y=20
let line=7

pdf.setFontSize(12)

pdf.text("JOA IT MOCK TEST RESULT",x,y)
y+=10

pdf.text("Name: "+studentName,x,y)
y+=line

pdf.text("Phone: "+studentPhone,x,y)
y+=line

pdf.text("Score: "+score+" / "+questions.length,x,y)
y+=10

questions.forEach((q,i)=>{

if(y>270){
pdf.addPage()
y=20
}

pdf.text("Q"+(i+1)+": "+q.eng,x,y)
y+=line

let hinText = pdf.splitTextToSize(q.hin,180)
pdf.text(hinText,x,y)
y+=hinText.length*line

pdf.text("A. "+q.A,x+5,y); y+=line
pdf.text("B. "+q.B,x+5,y); y+=line
pdf.text("C. "+q.C,x+5,y); y+=line
pdf.text("D. "+q.D,x+5,y); y+=line

pdf.text("Your Answer: "+(userAnswers[i]||"Not Attempted"),x+5,y)
y+=line

pdf.text("Correct Answer: "+q.ans,x+5,y)
y+=10

})

pdf.save("Mock_Test_Result.pdf")

}

</script>

</body>
</html>
