<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JOA IT Mock Test</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
color:#fff;
}

/* HEADER */
.header{
text-align:center;
padding:20px;
font-size:26px;
font-weight:bold;
}

/* TIMER FULL WIDTH */
.timerBar{
width:90%;
max-width:800px;
margin:10px auto;
background:rgba(255,255,255,0.2);
padding:12px;
border-radius:10px;
text-align:center;
font-size:20px;
font-weight:bold;
display:none;
}

/* CARD */
.card{
max-width:800px;
margin:20px auto;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:25px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

/* INPUT */
input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:none;
}

/* BUTTON */
button{
background:linear-gradient(45deg,#22c55e,#16a34a);
border:none;
padding:12px 20px;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
transform:scale(1.05);
}

/* OPTIONS */
.option{
display:block;
background:rgba(255,255,255,0.1);
padding:10px;
margin-top:8px;
border-radius:8px;
cursor:pointer;
}

.option:hover{
background:rgba(255,255,255,0.2);
}

</style>

</head>

<body>

<div class="header">JOA IT CBT Mock Test</div>

<div class="timerBar" id="examTimer"></div>

<!-- FORM -->
<div class="card" id="formBox">
<h3>Enter Details</h3>
<input id="name" placeholder="Enter Name">
<input id="phone" placeholder="Enter Phone">
<button onclick="beginTest()">Start Test</button>
</div>

<!-- COUNTDOWN -->
<div class="card" id="countBox" style="display:none;text-align:center;">
<h3>Test starts in</h3>
<h1 id="count">5</h1>
</div>

<!-- QUESTIONS -->
<div class="card" id="questionBox" style="display:none"></div>

<!-- RESULT -->
<div class="card" id="resultBox" style="display:none"></div>

<script>

/* QUESTIONS */
let questions=[
{
id:1,
en:"Which aggregate function calculates the average value?",
hi:"कौन-सा aggregate function average value निकालता है?",
A:"SUM()",
B:"AVG()",
C:"COUNT()",
D:"MAX()",
ans:"B"
},
{
id:2,
en:"Which SQL clause is used with aggregate functions to group rows?",
hi:"Aggregate functions के साथ rows को group करने के लिए कौन-सा SQL clause उपयोग होता है?",
A:"ORDER BY",
B:"GROUP BY",
C:"WHERE",
D:"HAVING",
ans:"B"
}
]

let current=0
let score=0
let userAnswers={}

let examTime=300   // change to 5400 for full test
let timer

/* TIMER */
function startTimer(){
timer=setInterval(()=>{
let min=Math.floor(examTime/60)
let sec=examTime%60

document.getElementById("examTimer").innerHTML=
"⏱ Time Left: "+min+":"+(sec<10?"0":"")+sec

examTime--

if(examTime<0){
clearInterval(timer)
alert("Time Over!")
showResult()
}

},1000)
}

/* BEGIN */
function beginTest(){

let name=document.getElementById("name").value
let phone=document.getElementById("phone").value

if(name=="" || phone==""){
alert("Enter details")
return
}

document.getElementById("formBox").style.display="none"
document.getElementById("countBox").style.display="block"

let t=5

let c=setInterval(()=>{
document.getElementById("count").innerHTML=t
t--

if(t<0){
clearInterval(c)
document.getElementById("countBox").style.display="none"
document.getElementById("questionBox").style.display="block"
document.getElementById("examTimer").style.display="block"

startTimer()
showQuestion()
}

},1000)
}

/* SHOW QUESTION */
function showQuestion(){

let q=questions[current]

let html=""

html+=`<h3>Q${current+1}. ${q.en}</h3>`
html+=`<p>${q.hi}</p>`

html+=`<label class="option"><input type="radio" name="ans" value="A"> A. ${q.A}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="B"> B. ${q.B}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="C"> C. ${q.C}</label>`
html+=`<label class="option"><input type="radio" name="ans" value="D"> D. ${q.D}</label>`

html+=`<button onclick="nextQuestion()">Next</button>`

document.getElementById("questionBox").innerHTML=html
}

/* NEXT */
function nextQuestion(){

let selected=document.querySelector('input[name="ans"]:checked')

if(selected){
userAnswers[current]=selected.value
if(selected.value==questions[current].ans){
score++
}
}

current++

if(current<questions.length){
showQuestion()
}else{
showResult()
}
}

/* RESULT */
function showResult(){

clearInterval(timer)

document.getElementById("questionBox").style.display="none"

let box=document.getElementById("resultBox")
box.style.display="block"

let html=""

html+=`<h2>RESULT</h2>`
html+=`Score: ${score} / ${questions.length}<br><br>`

questions.forEach((q,i)=>{
html+=`<hr><b>Q${i+1}. ${q.en}</b><br>`
html+=`${q.hi}<br>`
html+=`Your Answer: ${userAnswers[i]||"NA"}<br>`
html+=`Correct: ${q.ans}<br>`
})

html+=`<br><button onclick="downloadPDF()">Download PDF</button>`

box.innerHTML=html
}

/* PDF */
async function downloadPDF(){

const { jsPDF } = window.jspdf

let canvas=await html2canvas(document.getElementById("resultBox"))
let img=canvas.toDataURL("image/jpeg",0.6)

let pdf=new jsPDF()
pdf.addImage(img,"JPEG",10,10,190,0)
pdf.save("result.pdf")

}

</script>

</body>
</html>
